name: Export Unity Packages (.unitypackage)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  export-packages:
    name: Batch Export Unity Packages 📦
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-MultiExport
          restore-keys: |
            Library-
            
      - name: Exclude Library folder from git (local only)
        run: |
          mkdir -p .git/info
          # add a line to the local exclude file so Library/ is ignored for this run
          echo "Library/" >> .git/info/exclude
          git status --porcelain

      - name: Run Unity Export
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          buildMethod: MultiPackageExporter.ExportAllPackages

      - name: Upload Generated Packages
        uses: actions/upload-artifact@v4
        with:
          name: TrickleCharge-UnityPackages
          path: build/*.unitypackage

      - name: Publish Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.PACKAGE_NAME }}-v${{ env.PACKAGE_VERSION }}
          files: build/${{ env.PACKAGE_NAME }}.unitypackage
          generate_release_notes: true