name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-MultiExport
          restore-keys: |
            Library-

      - name: Run Unity Export
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: .
          buildMethod: MultiPackageExporter.ExportAllPackages

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TrickleCharge-UnityPackages
          path: build/*.unitypackage

  # JOB 2: Release each package individually
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating releases
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: TrickleCharge-UnityPackages
          path: build/

      - name: Publish Individual Releases
        shell: bash
        run: |
          for file in build/*.unitypackage; do
            # Extract package name (e.g., 'com.tricklecharge.unity.art')
            filename=$(basename "$file" .unitypackage)
            tag="${filename}-v${{ github.run_number }}"
          
            echo "Creating release for $filename..."
          
            # Use gh release create to publish the specific file
            gh release create "$tag" "$file" --title "Release $tag" --generate-notes
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}